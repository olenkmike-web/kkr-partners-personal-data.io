    <style>
      .video-sound-helper-wrap {
        display: flex;
        justify-content: center;
        margin-top: 12px;
      }
      .video-sound-helper-btn {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font: 600 14px/1.2 Montserrat, system-ui, sans-serif;
        background: #0f172a;
        color: #fff;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(15,23,42,.18);
      }
      .video-sound-helper-btn:hover { opacity: .92; }
    </style>
</head>

  <body>
    <div id="root"></div>
  
    <script>
      (function () {
        function attachSoundHelper() {
          var video = document.querySelector('video');
          if (!video || video.dataset.soundHelperAttached === '1') return false;

          video.dataset.soundHelperAttached = '1';
          video.controls = true;
          video.volume = 0.5;

          var wrap = document.createElement('div');
          wrap.className = 'video-sound-helper-wrap';

          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'video-sound-helper-btn';
          button.textContent = 'Включить звук';

          function hideButtonIfUnmuted() {
            if (!video.muted) {
              wrap.style.display = 'none';
            }
          }

          button.addEventListener('click', function () {
            video.muted = false;
            video.volume = 0.5;
            if (video.paused) {
              var p = video.play();
              if (p && typeof p.catch === 'function') { p.catch(function(){}); }
            }
            hideButtonIfUnmuted();
          });

          video.addEventListener('volumechange', hideButtonIfUnmuted);
          wrap.appendChild(button);
          video.insertAdjacentElement('afterend', wrap);
          return true;
        }

        function init() {
          if (attachSoundHelper()) return;
          var observer = new MutationObserver(function () {
            if (attachSoundHelper()) observer.disconnect();
          });
          observer.observe(document.body, { childList: true, subtree: true });
          setTimeout(function(){ try { observer.disconnect(); } catch(e){} }, 15000);
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', init);
        } else {
          init();
        }
      })();
    </script>

  </body>
